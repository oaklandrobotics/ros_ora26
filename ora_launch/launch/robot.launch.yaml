# Launch Robot State Publisher
launch:
# Launch Arguments
- arg:
    name: "use_sim_time"
    default: "False"
- arg:
    name: "model_name"
    default: "anteater.urdf.xacro"
- arg:
    name: "rviz_config"
    default: "config.rviz"
- arg:
    name: "world_name"
    default: "igvc_world.sdf"
- arg:
    name: "joy_config"
    default: "wired_xbox.yaml"

# Launch Nodes
- include:
    file: "$(find-pkg-share ora_description)/launch/rsp.launch.yaml"
    arg:
      - name: "use_sim_time"
        value: "$(var use_sim_time)"
      - name: "model_name"
        value: "$(var model_name)"
      - name: "rviz_config"
        value: "$(var rviz_config)"

- include:
    file: "$(find-pkg-share ora_teleop)/launch/teleop.launch.yaml"
    arg:
      - name: "use_sim_time"
        value: "$(var use_sim_time)"
      - name: "joy_config"
        value: "$(var joy_config)"

- include:
    file: "$(find-pkg-share ora_lidar)/launch/filter.launch.yaml"
    arg:
      - name: "use_sim_time"
        value: "$(var use_sim_time)"

- node:
    pkg: "controller_manager"
    exec: "ros2_control_node"
    param:
    - from: "$(find-pkg-share ora_sim)/config/sim_controller.yaml"

- node:
    pkg: "controller_manager"
    exec: "spawner"
    name: "diff_drive_spawner"
    args: "diff_cont"

- node:
    pkg: "controller_manager"
    exec: "spawner"
    name: "joint_broad_spawner"
    args: "joint_broad"
