# nav2_params.yaml: FusionCore + Nav2 reference configuration

# ── Behaviour Tree Navigator ──────────────────────────────────────────────────
bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: odom
    robot_base_frame: base_link
    odom_topic: /fusion/odom         # must point to FusionCore's odometry output
    bt_loop_duration: 10
    default_server_timeout: 20
    default_nav_to_pose_bt_xml: "/opt/ros/jazzy/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"
    default_nav_through_poses_bt_xml: "/opt/ros/jazzy/share/nav2_bt_navigator/behavior_trees/navigate_through_poses_w_replanning_and_recovery.xml"
    navigators: ['navigate_to_pose', 'navigate_through_poses']
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"

# ── Planner: NavFn (Global A*) ────────────────────────────────────────────────
planner_server:
  ros__parameters:
    use_sim_time: false
    planner_plugins: ['GridBased']
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5          # m: how close to goal counts as reached (relax for GPS noise)
      use_astar: true         # A* over Dijkstra for outdoor long-range
      allow_unknown: true     # plan through unexplored space (GPS-nav, no lidar map needed)

# ── Controller Server (RPP) ───────────────────────────────────────────────────
# 
controller_server:
  ros__parameters:
    use_sim_time: false
    enable_stamped_cmd_vel: true
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["position_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    position_goal_checker:
      stateful: true
      plugin: "nav2_controller::PositionGoalChecker"
      xy_goal_tolerance: 0.5      # Tolerance to meet goal completion criteria (m).
      path_length_tolerance: 0.5  # Tolerance to meet goal completion criteria (m).

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.5     # m/s: set to your comfortable cruise speed
      lookahead_dist: 1.0         # m: increase for faster/smoother outdoor driving
      min_lookahead_dist: 0.6
      max_lookahead_dist: 1.5
      lookahead_time: 1.0
      rotate_to_heading_angular_vel: 10.0
      transform_tolerance: 0.1
      use_velocity_scaled_lookahead_dist: true
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 1.0
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true
      use_fixed_curvature_lookahead: false
      curvature_feedforward_gain: 1.0
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.25
      use_rotate_to_heading: true     # rotate in place before starting: safe for GPS nav
      allow_reversing: false
      rotate_to_heading_min_angle: 0.785  # ~45 deg: only rotate if heading error > this
      max_angular_accel: 10.0
      max_robot_pose_search_dist: 10.0

# ── Smoother ──────────────────────────────────────────────────────────────────
# Smooth velocity outputs from Nav
velocity_smoother:
  ros__parameters:
    use_sim_time: false
    enable_stamped_cmd_vel: true
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    odom_topic: /fusion/odom
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
    max_velocity: [1.0, 0.0, 1.75]
    min_velocity: [-1.0, 0.0, -1.75]
    max_accel: [0.5, 0.0, 10.0]
    max_decel: [-0.5, 0.0, -10.0]

# ── Local Costmap ────────────────────────────────────────────────────────────
# Used for local plan
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 10.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width:  8
      height: 8
      resolution: 0.05
      footprint: "[[0.78, 0.39], [0.78, -0.39], [-0.495, -0.39], [-0.495, 0.39]]"
      plugins: ["obstacle_layer", "line_layer", "denoise_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: scan
        scan:
          topic: /scan_filtered
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          inf_is_valid: True
          data_type: "LaserScan"
          raytrace_max_range: 6.0
          raytrace_min_range: 0.0
          obstacle_max_range: 4.0
          obstacle_min_range: 0.0
      line_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"

        enabled: True
        footprint_clearing_enabled: true
        observation_sources: pointcloud

        min_obstacle_height: -0.5
        max_obstacle_height: 0.5

        z_voxels: 10
        origin_z: 0.0
        z_resolution: 0.2
        unknown_threshold: 15
        mark_threshold: 0
        combination_method: 1

        pointcloud:
          topic: /depth_camera/filtered/points
          data_type: "PointCloud2"
          min_obstacle_height: -0.5
          max_obstacle_height: 0.5

          inf_is_valid: True
          clearing: True
          marking: True

          obstacle_min_range: 0.0
          obstacle_max_range: 4.0
          raytrace_min_range: 0.0
          raytrace_max_range: 6.0
      denoise_layer:
        plugin: "nav2_costmap_2d::DenoiseLayer"
        enabled: true
        minimal_group_size: 2
        group_connectivity_type: 8
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 1.0
        inflation_radius: 1.0
      always_send_full_costmap: true

# ── Global Costmap ────────────────────────────────────────────────────────────
# Used to create global plan
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 2.0
      publish_frequency: 1.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 80
      height: 80
      resolution: 0.1
      footprint: "[[0.78, 0.39], [0.78, -0.39], [-0.495, -0.39], [-0.495, 0.39]]"
      track_unknown_space: false     # true = plan through unknown (GPS-nav mode)
      plugins: ["obstacle_layer", "line_layer", "denoise_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: scan
        scan:
          topic: /scan_filtered
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 6.0
          raytrace_min_range: 0.0
          obstacle_max_range: 4.0
          obstacle_min_range: 0.0
      line_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"

        enabled: True
        footprint_clearing_enabled: true
        observation_sources: pointcloud

        min_obstacle_height: -0.5
        max_obstacle_height: 0.5

        z_voxels: 10
        origin_z: 0.0
        z_resolution: 0.2
        unknown_threshold: 15
        mark_threshold: 0
        combination_method: 1

        pointcloud:
          topic: /depth_camera/filtered/points
          data_type: "PointCloud2"
          min_obstacle_height: -2.0
          max_obstacle_height: 2.0

          inf_is_valid: True
          clearing: True
          marking: True

          obstacle_min_range: 0.0
          obstacle_max_range: 4.0
          raytrace_min_range: 0.0
          raytrace_max_range: 6.0
      denoise_layer:
        plugin: "nav2_costmap_2d::DenoiseLayer"
        enabled: true
        minimal_group_size: 2
        group_connectivity_type: 8
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 1.0
        inflation_radius: 1.0
      always_send_full_costmap: false

# ── Map Server ────────────────────────────────────────────────────────────────
# No map available 
map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

# ── Behavior Server ───────────────────────────────────────────────────────────
# Recovery behaviors
behavior_server:
  ros__parameters:
    use_sim_time: false
    enable_stamped_cmd_vel: true
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["backup", "drive_on_heading", "wait", "spin"]
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    spin:
      plugin: "nav2_behaviors::Spin"
    local_frame: odom
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.2
    min_rotational_vel: 0.2
    rotational_acc_lim: 3.0

# ── Collision Monitor ─────────────────────────────────────────────────────────
# Checks whether the robot is going to collide with an obstacle
# Using lidar and lane lines as collidables
collision_monitor:
  ros__parameters:
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel_nav_out"
    enable_stamped_cmd_vel: true
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.2
    source_timeout: 1.0
    base_shift_correction: True
    stop_pub_timeout: 2.0
    polygons: ["FootprintApproach"]
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 1.2
      simulation_time_step: 0.1
      min_points: 6
      visualize: False
      enabled: True
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "scan_filtered"
      min_height: 0.15
      max_height: 2.0
      enabled: True

# ── Docking Server ────────────────────────────────────────────────────────────
# Unused
# Nav2 required the docking server to be in the nav2_params file to launch the
# bringup.
docking_server:
  ros__parameters:
    controller_frequency: 50.0
    initial_perception_timeout: 5.0
    wait_charge_timeout: 5.0
    dock_approach_timeout: 30.0
    undock_linear_tolerance: 0.05
    undock_angular_tolerance: 0.1
    max_retries: 3
    base_frame: "base_link"
    fixed_frame: "odom"
    dock_backwards: false
    dock_prestaging_tolerance: 0.5

    dock_plugins: ['simple_charging_dock']
    simple_charging_dock:
      plugin: 'opennav_docking::SimpleChargingDock'
      docking_threshold: 0.05
      staging_x_offset: -0.7
      use_external_detection_pose: true
      use_battery_status: false # true
      use_stall_detection: false # true

      external_detection_timeout: 1.0
      external_detection_translation_x: -0.18
      external_detection_translation_y: 0.0
      external_detection_rotation_roll: -1.57
      external_detection_rotation_pitch: -1.57
      external_detection_rotation_yaw: 0.0
      filter_coef: 0.1

    controller:
      k_phi: 3.0
      k_delta: 2.0
      v_linear_min: 0.15
      v_linear_max: 0.15
      use_collision_detection: true
      costmap_topic: "local_costmap/costmap_raw"
      footprint_topic: "local_costmap/published_footprint"
      transform_tolerance: 0.1
      projection_time: 5.0
      simulation_step: 0.1
      dock_collision_threshold: 0.3

# ── Lifecycle Manager ─────────────────────────────────────────────────────────
lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - planner_server
      - controller_server
      - behavior_server
      - bt_navigator
      - velocity_smoother
      - collision_monitor