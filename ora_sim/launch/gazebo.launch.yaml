# Launch Robot State Publisher
launch:
# Launch Arguments
- arg:
    name: "world_name"
    default: "igvc_world.sdf"

- executable:
    cmd: "gz sim -g"
    name: "Launch gazebo GUI"
    output: "screen"

# Launch Nodes
- include:
    file: "$(find-pkg-share ros_gz_sim)/launch/gz_server.launch.py"
    arg:
      - name: "world_sdf_file"
        value: "$(find-pkg-share ora_sim)/worlds/$(var world_name)"
      - name: "container_name"
        value: "ros_gz_container"
      - name: "create_own_container"
        value: "True"
      - name: "use_composition"
        value: "True"

- include:
    file: "$(find-pkg-share ros_gz_bridge)/launch/ros_gz_bridge.launch.py"
    arg:
      - name: "bridge_name"
        value: "ora_ros_gz_bridge"
      - name: "config_file"
        value: "$(find-pkg-share ora_sim)/config/bridge_config.yaml"
      - name: "create_own_container"
        value: "True"
      - name: "use_composition"
        value: "False"

- include:
    file: "$(find-pkg-share ros_gz_sim)/launch/gz_spawn_model.launch.py"
    arg:
      - name: "world"
        value: "igvc_world"
      - name: "topic"
        value: "/robot_description"
      - name: "entity_name"
        value: "Erdferkel"
      - name: "z"
        value: "0.65"

- node:
    pkg: "ora_sim"
    exec: "gz_pose_to_gps"
    name: "gz_pose_to_gps"
    output: "screen"
    param:
    - name: "use_sim_time"
      value: true
