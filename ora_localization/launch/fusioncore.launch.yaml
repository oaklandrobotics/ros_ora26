# Launch Robot State Publisher
launch:
# Launch Arguments
- arg:
    name: "use_sim_time"
    default: "True"

# Launch node
- node:
    pkg: "fusioncore_ros"
    exec: "fusioncore_node"
    name: "fusioncore"
    param:
      - name: "params_file"
        value: "$(find-pkg-share ora_localization)/config/fusioncore_config.yaml"
      - name: "use_sim_time"
        value: "$(var use_sim_time)"
    remap:
      - from: "/imu/data"
        to: "/imu"
      - from: "/odom/wheels"
        to: "/diff_cont/odom"
      - from: "/gnss/fix"
        to: "/gnss/fix"