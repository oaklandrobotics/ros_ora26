launch:
- group:
  - set_parameter:
      name: "qos_overrides./gnss/fix.publisher.reliability"
      value: "reliable"

  - include:
      file: "$(find-pkg-share ublox_dgnss)/launch/ublox_rover_hpposllh_navsatfix.launch.py"
      arg:
        - name: "namespace"
          value: "gnss"
        - name: "frame_id"
          value: "gnss_link"

  # NTRIP Client
  - include:
      file: "$(find-pkg-share ublox_dgnss)/launch/ntrip_client.launch.py"
      arg:
      - name: "host"
        value: "148.149.0.87"
      - name: "port"
        value: "10001"
      - name: "mountpoint"
        value: "METR_RTCM3-GG"
      - name: "username"
        value: "ourobotics"
      - name: "password"
        value: "$(env MDOT_PW)" # make sure to run `export MDOT_PW=<the_password>` before launching
      - name: "use_https"
        value: "False"
