# https://github.com/stereolabs/zed-ros-wrapper/tree/master/zed_wrapper/params
# https://stereolabs.com/docs/ros2/zed-node#configuration-parameters

/**:
  ros__parameters:

    general:
      grab_resolution: 'HD720'
      grab_frame_rate: 15
      pub_frame_rate: 15.0
      pub_resolution: 'NATIVE'
      enable_image_validity_check: 1

    depth:
      depth_mode: 'NEURAL_LIGHT'
      depth_stabilization: 80
      point_cloud_freq: 10.0

    pos_tracking:
      pos_tracking_enabled: false  
      publish_tf: false
      publish_map_tf: false
      map_frame: 'odom'
      odometry_frame: 'odom'
