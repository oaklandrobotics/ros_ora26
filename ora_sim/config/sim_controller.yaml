controller_manager:
  ros__parameters:
    update_rate: 60

    diff_cont:
      type: diff_drive_controller/DiffDriveController

    joint_broad:
      type: joint_state_broadcaster/JointStateBroadcaster

diff_cont:
  ros__parameters:
    publish_rate: 60.0

    left_wheel_names: ['left_wheel_joint']
    right_wheel_names: ['right_wheel_joint']

    wheel_separation: 0.5715
    wheel_radius: 0.1651

    odom_frame_id: odom
    base_frame_id: base_link
    enable_odom_tf: false

    position_feedback: false
    open_loop: false

joint_broad:
  ros__parameters:
    extra_joints:
      - left_front_caster_joint
      - right_front_caster_joint
      - left_back_caster_joint
      - right_back_caster_joint
