# u-blox driver
- include:
    file: "$(find-pkg-share ublox_dgnss)/launch/ublox_rover_hpposllh_navsatfix.launch.py"

# NTRIP Client
- include:
    file: "$(find-pkg-share ublox_dgnss)/launch/ntrip_client.launch.py"
    arg:
    - name: "host"
      value: "148.149.0.87"
    - name: "port"
      value: "10001"
    - name: "mountpoint"
      value: "METR_RTCM3-GG"
    - name: "username" #TODO get ORA creds instead of my own
      value: "dmocnik"
    - name: "password"
      value: "$(env MDOT_PW)" # make sure to run `export MDOT_PW=<the_password>` before launching
    - name: "use_https"
      value: "False"